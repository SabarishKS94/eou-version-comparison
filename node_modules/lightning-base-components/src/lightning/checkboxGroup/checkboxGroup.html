<template>
    <fieldset>

        <legend class={computedLegendClass}>
            <template if:true={required}>
                <abbr class="slds-required" title={i18n.required}>*</abbr>
            </template>
            {label}
        </legend>

        <div class="slds-form-element__control">
            <template for:each={transformedOptions} for:item="option">
                <span class="slds-checkbox" key={option.value}>
                    <input type="checkbox" name={name}
                        id={option.id}
                        checked={option.isChecked}
                        value={option.value}
                        disabled={disabled}
                        onclick={handleClick}
                        onchange={handleChange}
                        onfocus={handleFocus}
                        onblur={handleBlur}
                        >
                    <label class="slds-checkbox__label" for={option.id}>
                        <span class="slds-checkbox_faux"></span>
                        <span class="slds-form-element__label">{option.label}</span>
                    </label>
                </span>
            </template>
        </div>

        <template if:true={isFixStaticErrorDOMEnabled}>
            <div role="status">
                <div
                    id="help-message"
                    data-helptext
                    class="slds-form-element__help"
                >
                    <template if:true={_helpMessage}>
                        <span class="slds-assistive-text">{label}</span>
                        {_helpMessage}
                    </template>
                </div>
            </div>
        </template>
        <template if:false={isFixStaticErrorDOMEnabled}>
            <template if:true={_helpMessage}>
                <div
                    data-helptext
                    id="helptext"
                    role="alert"
                    class="slds-form-element__help"
                >{_helpMessage}</div>
            </template>
        </template>

    </fieldset>
</template>
