<template>
    <label class={computedLabelClass} for="select" part="select-label">
        <template if:true={required}>
            <abbr class="slds-required" title={i18n.required} part="required">*</abbr>
        </template>
        {label}
    </label>
    <lightning-helptext content={fieldLevelHelp} if:true={fieldLevelHelp} alternative-text={helptextAlternativeText}></lightning-helptext>

    <div class="slds-form-element__control">
        <div class="slds-select_container">
            <select
                autocomplete={autocomplete}
                class="slds-select"
                disabled={disabled}
                id="select"
                multiple={multiple}
                name={name}
                onblur={handleBlur}
                onchange={handleChange}
                onfocus={handleFocus}
                required={required}
                accesskey={accessKey}
                size={size}
                aria-invalid={computedAriaInvalid}
                part="select">
                <template for:each={options} for:item="option">
                    <template if:true={option.disabled}>
                        <option disabled key={option.value} value={option.value}>{option.label}</option>
                    </template>
                    <template if:false={option.disabled}>
                        <option key={option.value} value={option.value}>{option.label}</option>
                    </template>
                </template>
            </select>
        </div>
    </div>

    <template lwc:if={isFixStaticErrorDOMEnabled}>
        <div role="status">
            <div
                id="help-message-err"
                data-help-message
                class="slds-form-element__help"
            >
                <template lwc:if={_helpMessage}>
                    <span class="slds-assistive-text">{label}</span>
                    {_helpMessage}
                </template>
                <template lwc:else></template>
            </div>
        </div>
    </template>
    <template lwc:else>
        <div role="status">
            <div
                if:true={_helpMessage}
                id="help-message"
                data-help-message
                class="slds-form-element__help"
            >
                <span class="slds-assistive-text">{label}</span>
                {_helpMessage}
            </div>
        </div>
    </template>
</template>
