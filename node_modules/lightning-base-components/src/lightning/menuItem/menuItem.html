<template>
    <div class="slds-dropdown__item" part="menu-item">
        <a href={computedHref}
            target={_target}
            role={computedRole}
            tabindex={computedTabIndex}
            accesskey={computedAccessKey}
            aria-checked={computedAriaChecked}
            aria-disabled={computedAriaDisabled}
            download={download}
            onclick={handleClick}
            onfocus={handleFocus}
            onkeydown={handleKeyDown}
            onblur={handleBlur}>

            <span>
                <template if:true={isMenuItemCheckbox}>
                    <lightning-primitive-icon
                        icon-name='utility:check'
                        size="x-small"
                        svg-class={computedCheckedIconClass}
                        variant="bare">
                    </lightning-primitive-icon>
                </template>

                <!-- draft marker -->
                <abbr if:true={isDraft} class="slds-indicator_unsaved" title={draftAlternativeText}>*</abbr>

                <!-- Prefix icon -->
                <template if:true={prefixIconName}>
                    <lightning-primitive-icon
                        class="slds-m-right_x-small"
                        icon-name={prefixIconName}
                        size="x-small"
                        svg-class={prefixSVGClass}
                        variant={prefixIconVariant}>
                    </lightning-primitive-icon>
                </template>

                {label}
                </span>

                <!-- Suffix icon -->
                <template if:true={iconName}>
                    <lightning-primitive-icon
                        class="slds-m-left_small"
                        icon-name={iconName}
                        size="x-small"
                        svg-class={suffixSVGClass}
                        variant={suffixIconVariant}>
                        </lightning-primitive-icon>
                </template>
        </a>
    </div>
</template>
