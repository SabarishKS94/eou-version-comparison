<template>
    <template lwc:if={csrOnly}>
        <!-- Container for rich text -->
        <span lwc:dom="manual" part="formatted-rich-text"></span>
    </template>
    <template lwc:else>
        <!-- Sub component handles SSR using inner-html directive -->
         <template lwc:if={enableFormattedRichTextParts}>
            <lightning-formatted-rich-text-renderer  
                value={value} 
                disable-linkify={disableLinkify}
                exportparts="heading, paragraph, link, user-content-hook-1, user-content-hook-2, user-content-hook-3"
            ></lightning-formatted-rich-text-renderer>
        </template>
        <template lwc:else>
            <lightning-formatted-rich-text-renderer  
                value={value} 
                disable-linkify={disableLinkify}
            ></lightning-formatted-rich-text-renderer>
        </template>
    </template>
</template>
