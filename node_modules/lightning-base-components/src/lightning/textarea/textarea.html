<template>
    <label class={computedLabelClass} for="input" part="label">
        <template if:true={required}>
            <abbr class="slds-required" title={i18n.required} aria-hidden="true">*</abbr>
        </template>
        {label}
        <slot name="label-end"></slot>
    </label>
    <lightning-helptext
        if:true={fieldLevelHelp}
        content={fieldLevelHelp}
        alternative-text={helptextAlternativeText}
    ></lightning-helptext>
    <div
        class={computedDivClass}
        data-gate-textarea-readonly={shouldAddDataTextareaReadonlyAttr}
    >
        <textarea
            id="input"
            class={computedTextareaClass}
            data-gate-textarea-readonly={shouldAddDataTextareaReadonlyAttr}
            aria-invalid={computedAriaInvalid}
            autocomplete={autocomplete}
            oninput={handleInput}
            onchange={handleChange}
            onfocus={handleFocus}
            onblur={handleBlur}
            readonly={readOnly}
            disabled={disabled}
            name={name}
            maxlength={maxLength}
            minlength={minLength}
            placeholder={placeholder}
            required={required}
            accesskey={accessKey}
            part="textarea"
        >
            {_defaultValue}
        </textarea>
    </div>
    <div role="status">
        <div
            if:true={_helpMessage}
            id="help-message"
            data-help-message
            class="slds-form-element__help"
        >
            <span class="slds-assistive-text">{label}</span>
            {_helpMessage}
        </div>
    </div>
</template>
