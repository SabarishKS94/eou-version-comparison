<template>
    <div
        id="overlay-base-div"
        class="overlay-surface"
        lwc:ref="surface"
        popover={popover}
        data-open={isPanelOpen}
        ontoggle={handleToggle}
    >
        <template lwc:if={focusTrapEnabled}>
            <lightning-focus-trap>
                <div class="popover__container">
                    <div data-slot lwc:dom="manual"></div>
                </div>
            </lightning-focus-trap>
        </template>
        <template lwc:else>
            <div class="popover__container">
                <div data-slot lwc:dom="manual"></div>
            </div>
        </template>
    </div>
</template>
