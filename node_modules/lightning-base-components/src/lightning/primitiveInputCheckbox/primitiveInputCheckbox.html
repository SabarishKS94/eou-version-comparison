<template>
    <template if:false={isStandardVariant}>
        <template lwc:if={showReadOnlyIcon}>
            <span part="label" class={computedLabelClass}>{label}</span>
        </template>
        <template lwc:else>
            <label for="checkbox" part="label-container" class="slds-checkbox__label">
                <template if:true={required}>
                    <abbr class="slds-required" title={labelRequired} part="required" aria-hidden="true">*</abbr>
                </template>
                <span part="label" class={computedLabelClass}>{label}</span>
            </label>
        </template>
        <lightning-helptext if:true={fieldLevelHelp} content={fieldLevelHelp} alternative-text={helptextAlternativeText}></lightning-helptext>
    </template>
    <div class="slds-form-element__control slds-grow">
        <template lwc:if={showReadOnlyIcon}>
            <lightning-icon 
                class="slds-current-color slds-m-right_x-small"
                size="x-small"
                icon-name={computedIconName}
                title={computedIconTitle}
                alternative-text={computedIconTitle}>
            </lightning-icon>
            <template if:true={isStandardVariant}>
                <span part="label" class={computedLabelClass}>{label}</span>
                <lightning-helptext if:true={fieldLevelHelp} content={fieldLevelHelp} alternative-text={helptextAlternativeText}></lightning-helptext>
            </template>
        </template>
        <template lwc:else>
            <span part="input-checkbox" class={computedCheckboxClass}>
                <template if:true={isStandardVariant}>
                    <template if:true={required}>
                        <abbr class="slds-required" title={labelRequired} part="required" aria-hidden="true">*</abbr>
                    </template>
                </template>
                <input
                    type="checkbox"
                    part="checkbox"
                    id="checkbox"
                    aria-label={ariaLabel}
                    aria-keyshortcuts={ariaKeyShortcuts}
                    aria-disabled={ariaDisabled}
                    aria-roledescription={ariaRoleDescription}
                    aria-invalid={ariaInvalid}
                    accesskey={accessKey}
                    onblur={handleBlur}
                    onfocus={handleFocus}
                    onchange={handleChange}
                    onclick={handleClick}
                    name={name}
                    required={required}
                    readonly={readOnly}
                    disabled={disabled}>
                <template if:false={isStandardVariant}>
                    <span part="indicator" class="slds-checkbox_faux"></span>
                </template>
                <template if:true={isStandardVariant}>
                    <label for="checkbox" part="label-container" class="slds-checkbox__label">
                        <span part="indicator" class="slds-checkbox_faux"></span>
                        <span part="label" class={computedLabelClass}>{label}</span>
                    </label>
                    <lightning-helptext if:true={fieldLevelHelp} content={fieldLevelHelp} alternative-text={helptextAlternativeText}></lightning-helptext>
                </template>
            </span>
        </template>
    </div>
    <div id="help-message" data-name={name} class="slds-form-element__help" data-help-message part="help-text" aria-live="polite">
        <template if:true={helpMessage}>
            <span class="slds-assistive-text">{label}</span>
            {helpMessage}
        </template>
    </div>
</template>
