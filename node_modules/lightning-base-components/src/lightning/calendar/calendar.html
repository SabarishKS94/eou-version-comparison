<template>
    <div aria-hidden="false"
         aria-label={computedAriaLabel}
         class="slds-datepicker slds-dropdown slds-dropdown_left"
         role="dialog"
         tabindex="-1"
         part="overlay dropdown calendar"
         lwc:ref="calendar">
        <lightning-focus-trap>
            <div class="slds-datepicker__filter slds-grid">
                <div class="slds-datepicker__filter_month slds-grid slds-grid_align-spread slds-grow">
                    <div class="slds-align-middle">
                        <lightning-button-icon
                            disabled={computedPrevDisabled}
                            icon-name={previousMonthIconName}
                            variant="container"
                            alternative-text={i18n.previousMonth}
                            onclick={goToPreviousMonth}>
                        </lightning-button-icon>
                    </div>
                    <h2 aria-atomic="false"
                        aria-live="polite"
                        class="slds-align-middle"
                        id="month-title"
                        data-index={monthIndex}>
                        {computedMonthTitle}
                    </h2>
                    <div class="slds-align-middle">
                        <lightning-button-icon
                            disabled={computedNextDisabled}
                            icon-name={nextMonthIconName}
                            variant="container"
                            alternative-text={i18n.nextMonth}
                            onclick={goToNextMonth}>
                        </lightning-button-icon>
                    </div>
                </div>
                <div class="slds-shrink-none">
                    <lightning-select
                        value={calendarYear}
                        label={i18n.yearSelector}
                        variant="label-hidden"
                        options={computedYearList}
                        onchange={handleYearChange}
                        onclick={handleYearSelectClick}
                    ></lightning-select>
                    <template if:true={isCalendarGridCellAriaFixEnabled}>
                        <span
                            id="year-selected"
                            class="slds-assistive-text"
                        >{calendarYear}</span>
                    </template>
                </div>
            </div>
            <table
                class="slds-datepicker__month"
                role="grid"
                aria-labelledby={computedGridAriaLabelledby}
            >
                <thead>
                    <tr id="weekdays-element">
                        <template for:each={computedWeekdayLabels} for:item="weekday">
                            <th key={weekday.fullName} id={weekday.fullName} scope="col">
                                <abbr title={weekday.fullName}>{weekday.shortName}</abbr>
                            </th>
                        </template>
                    </tr>
                </thead>
                <tbody onkeydown={handleCalendarKeyDown}>
                    <template for:each={computedMonth} for:item="week" for:index="index">
                        <tr key={week.id}>
                            <template for:each={week.days} for:item="day">
                                <template if:true={isCalendarGridCellAriaFixEnabled}>
                                    <td
                                        role="gridcell"
                                        class={day.className}
                                        key={day.dateValue}
                                        data-value={day.dateValue}
                                    >
                                        <span
                                            class="slds-day"
                                            onclick={handleDateClick}
                                            tabindex={day.tabIndex}
                                            aria-selected={day.isSelected}
                                            aria-current={day.ariaCurrent}
                                            aria-disabled={day.ariaDisabled}
                                            role="button"
                                        >{day.dayInMonth}</span>
                                    </td>
                                </template>
                                <template if:false={isCalendarGridCellAriaFixEnabled}>
                                    <td
                                        role="gridcell"
                                        aria-selected={day.isSelected}
                                        aria-current={day.ariaCurrent}
                                        class={day.className}
                                        key={day.dateValue}
                                        data-value={day.dateValue}
                                        aria-disabled={day.ariaDisabled}
                                        aria-label={day.dateValue}
                                    >
                                        <span
                                            class="slds-day"
                                            onclick={handleDateClick}
                                            tabindex={day.tabIndex}
                                            role="button"
                                        >{day.dayInMonth}</span>
                                    </td>
                                </template>
                            </template>
                        </tr>
                    </template>
                </tbody>
            </table>
            <button name="today"
                    type="button"
                    class="slds-button slds-align_absolute-center slds-text-link"
                    onclick={handleTodayClick}>
                {i18n.today}
            </button>
        </lightning-focus-trap>
    </div>
</template>
