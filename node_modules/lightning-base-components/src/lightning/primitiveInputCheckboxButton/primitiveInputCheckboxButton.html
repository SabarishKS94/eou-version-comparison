<template>
    <label class={computedCheckboxButtonClass} for="checkbox-button" part="input-checkbox-button">
        <input type="checkbox" id="checkbox-button"
            aria-label={ariaLabel}
            aria-keyshortcuts={ariaKeyShortcuts}
            aria-disabled={ariaDisabled}
            aria-roledescription={ariaRoleDescription}
            aria-invalid={ariaInvalid}
            accesskey={accessKey}
            class="slds-assistive-text"
            onblur={handleBlur}
            onfocus={handleFocus}
            onchange={handleChange}
            onclick={handleClick}
            name={name}
            required={required}
            readonly={readOnly}
            disabled={disabled}
            part="checkbox">
        <lightning-icon 
            alternative-text={label}
            class="slds-current-color"
            icon-name={iconName}
            size="x-small"
            part="faux-button">
        </lightning-icon>
    </label>
    <div id="help-message" data-name={name} class="slds-form-element__help" data-help-message part="help-text" role="status">
        <template if:true={_helpMessage}>
            <span class="slds-assistive-text">{label}</span>
            {_helpMessage}
        </template>
    </div>
</template>
