<template>
    <div class="slds-checkbox_add-button" part="input-checkbox-button">
        <input type="checkbox" id="checkbox-button"
            aria-label={ariaLabel}
            aria-keyshortcuts={ariaKeyShortcuts}
            aria-disabled={ariaDisabled}
            aria-roledescription={ariaRoleDescription}
            aria-invalid={ariaInvalid}
            accesskey={accessKey}
            class="slds-assistive-text"
            onblur={handleBlur}
            onfocus={handleFocus}
            onchange={handleChange}
            onclick={handleClick}
            name={name}
            required={required}
            readonly={readOnly}
            disabled={disabled}
            part="checkbox">
        <label for="checkbox-button" class="slds-checkbox_faux" part="faux-button">
            <span class="slds-assistive-text" part="label">{label}</span>
        </label>
    </div>        
    <div id="help-message" data-name={name} class="slds-form-element__help" data-help-message part="help-text" role="status">
        <template if:true={_helpMessage}>
            <span class="slds-assistive-text">{label}</span>
            {_helpMessage}
        </template>
    </div>
</template>
