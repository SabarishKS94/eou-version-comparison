<template>
    <span class={computedWrapperClass}>
        <!-- tree toggle -->
        <template if:true={hasTreeData}>
            <template if:true={consolidateTypeAttributes}>
                <lightning-primitive-treegrid-cell-toggle
                    row-key-value={rowKeyValue}
                    col-key-value={colKeyValue}
                    display-value={displayValue}
                    row-toggle-icon={rowToggleIcon}
                    url-label={urlLabel}
                    value={value}
                    has-children={treeAttributes.hasChildren}
                    is-expanded={treeAttributes.isExpanded}
                    tabindex={internalTabIndex}
                    data-navigation="enable"
                >
                </lightning-primitive-treegrid-cell-toggle>
            </template>
            <template if:false={consolidateTypeAttributes}>
                <lightning-primitive-treegrid-cell-toggle
                    row-key-value={rowKeyValue}
                    col-key-value={colKeyValue}
                    display-value={displayValue}
                    row-toggle-icon={rowToggleIcon}
                    url-label={urlLabel}
                    value={value}
                    has-children={typeAttribute21}
                    is-expanded={typeAttribute22}
                    tabindex={internalTabIndex}
                    data-navigation="enable"
                >
                </lightning-primitive-treegrid-cell-toggle>
            </template>
        </template>

        <div class={computedCellDivClass} style={computedCssStyles}>
            <!-- *************** PREFIX ICONS DO NOT ADD ANY TYPE BEFORE THIS *************** -->

            <!-- left icon -->
            <template if:true={hasLeftIcon}>
                <lightning-icon
                    icon-name={iconName}
                    size="x-small"
                    class="slds-m-right_x-small"
                    alternative-text={iconAlternativeText}
                ></lightning-icon>
                {iconLabel}
            </template>

            <!-- *************** PREFIX ICONS END *************** -->

            <!-- action -->
            <template if:true={isAction}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-primitive-cell-actions
                        data-navigation="enable"
                        data-action-triggers="enter,space"
                        row-key-value={rowKeyValue}
                        col-key-value={colKeyValue}
                        tabindex={internalTabIndex}
                        internal-tab-index={internalTabIndex}
                        menu-alignment={cellTypeAttributes.menuAlignment}
                        row-actions={cellTypeAttributes.rowActions}
                    >
                    </lightning-primitive-cell-actions>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-primitive-cell-actions
                        data-navigation="enable"
                        data-action-triggers="enter,space"
                        row-key-value={rowKeyValue}
                        col-key-value={colKeyValue}
                        tabindex={internalTabIndex}
                        internal-tab-index={internalTabIndex}
                        menu-alignment={typeAttribute0}
                        row-actions={typeAttribute1}
                    >
                    </lightning-primitive-cell-actions>
                </template>
            </template>

            <!-- button -->
            <template if:true={isButton}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-primitive-cell-button
                        data-navigation="enable"
                        data-action-triggers="enter,space"
                        row-key-value={rowKeyValue}
                        col-key-value={colKeyValue}
                        variant={cellTypeAttributes.variant}
                        label={cellTypeAttributes.label}
                        icon-name={cellTypeAttributes.iconName}
                        icon-position={cellTypeAttributes.iconPosition}
                        disabled={cellTypeAttributes.disabled}
                        button-name={cellTypeAttributes.name}
                        button-class={cellTypeAttributes.class}
                        button-title={cellTypeAttributes.title}
                        tabindex={internalTabIndex}
                        internal-tab-index={internalTabIndex}
                    >
                    </lightning-primitive-cell-button>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-primitive-cell-button
                        data-navigation="enable"
                        data-action-triggers="enter,space"
                        row-key-value={rowKeyValue}
                        col-key-value={colKeyValue}
                        variant={typeAttribute0}
                        label={typeAttribute1}
                        icon-name={typeAttribute2}
                        icon-position={typeAttribute3}
                        disabled={typeAttribute4}
                        button-name={typeAttribute5}
                        button-class={typeAttribute6}
                        button-title={typeAttribute7}
                        tabindex={internalTabIndex}
                        internal-tab-index={internalTabIndex}
                    >
                    </lightning-primitive-cell-button>
                </template>
            </template>

            <!-- button-icon-->
            <template if:true={isButtonIcon}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-primitive-cell-button
                        data-navigation="enable"
                        data-action-triggers="enter,space"
                        type="button-icon"
                        row-key-value={rowKeyValue}
                        col-key-value={colKeyValue}
                        variant={cellTypeAttributes.variant}
                        alternative-text={cellTypeAttributes.alternativeText}
                        icon-name={cellTypeAttributes.iconName}
                        icon-class={cellTypeAttributes.iconClass}
                        disabled={cellTypeAttributes.disabled}
                        button-name={cellTypeAttributes.name}
                        button-class={cellTypeAttributes.class}
                        button-title={cellTypeAttributes.title}
                        tabindex={internalTabIndex}
                        internal-tab-index={internalTabIndex}
                    >
                    </lightning-primitive-cell-button>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-primitive-cell-button
                        data-navigation="enable"
                        data-action-triggers="enter,space"
                        type="button-icon"
                        row-key-value={rowKeyValue}
                        col-key-value={colKeyValue}
                        variant={typeAttribute0}
                        alternative-text={typeAttribute1}
                        icon-name={typeAttribute2}
                        icon-class={typeAttribute3}
                        disabled={typeAttribute4}
                        button-name={typeAttribute5}
                        button-class={typeAttribute6}
                        button-title={typeAttribute7}
                        tabindex={internalTabIndex}
                        internal-tab-index={internalTabIndex}
                    >
                    </lightning-primitive-cell-button>
                </template>
            </template>

            <!-- boolean -->
            <template if:true={isBoolean}>
                <template if:true={isChecked}>
                    <lightning-primitive-icon
                        size="x-small"
                        icon-name="utility:check"
                    >
                    </lightning-primitive-icon>
                </template>
                <span class="slds-assistive-text"
                    >{booleanCellAssistiveText}</span
                >
            </template>

            <!-- currency -->
            <template if:true={isCurrency}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-formatted-number
                        value={value}
                        format-style="currency"
                        currency-code={cellTypeAttributes.currencyCode}
                        currency-display-as={cellTypeAttributes.currencyDisplayAs}
                        minimum-integer-digits={cellTypeAttributes.minimumIntegerDigits}
                        minimum-fraction-digits={cellTypeAttributes.minimumFractionDigits}
                        maximum-fraction-digits={cellTypeAttributes.maximumFractionDigits}
                        minimum-significant-digits={cellTypeAttributes.minimumSignificantDigits}
                        maximum-significant-digits={cellTypeAttributes.maximumSignificantDigits}
                    >
                    </lightning-formatted-number>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-formatted-number
                        value={value}
                        format-style="currency"
                        currency-code={typeAttribute0}
                        currency-display-as={typeAttribute1}
                        minimum-integer-digits={typeAttribute2}
                        minimum-fraction-digits={typeAttribute3}
                        maximum-fraction-digits={typeAttribute4}
                        minimum-significant-digits={typeAttribute5}
                        maximum-significant-digits={typeAttribute6}
                    >
                    </lightning-formatted-number>
                </template>
            </template>

            <!-- custom type -->
            <template if:true={isCustomType}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-primitive-custom-cell
                        lwc:ref="customCell"
                        types={types}
                        keyboard-mode={keyboardMode}
                        column-type={columnType}
                        column-sub-type={columnSubType}
                        value={value}
                        editable={editable}
                        internal-tab-index={internalTabIndex}
                        row-key-value={rowKeyValue}
                        col-key-value={colKeyValue}
                        wrap-text={wrapText}
                        alignment={alignment}
                        cell-type-attributes={cellTypeAttributes}
                    >
                    </lightning-primitive-custom-cell>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-primitive-custom-cell
                        lwc:ref="customCell"
                        types={types}
                        keyboard-mode={keyboardMode}
                        column-type={columnType}
                        column-sub-type={columnSubType}
                        value={value}
                        editable={editable}
                        internal-tab-index={internalTabIndex}
                        row-key-value={rowKeyValue}
                        col-key-value={colKeyValue}
                        wrap-text={wrapText}
                        alignment={alignment}
                        type-attribute-0={typeAttribute0}
                        type-attribute-1={typeAttribute1}
                        type-attribute-2={typeAttribute2}
                        type-attribute-3={typeAttribute3}
                        type-attribute-4={typeAttribute4}
                        type-attribute-5={typeAttribute5}
                        type-attribute-6={typeAttribute6}
                        type-attribute-7={typeAttribute7}
                        type-attribute-8={typeAttribute8}
                        type-attribute-9={typeAttribute9}
                        type-attribute-10={typeAttribute10}
                    >
                    </lightning-primitive-custom-cell>
                </template>
            </template>

            <!-- datetime -->
            <template if:true={isDateTime}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-formatted-date-time
                        value={dateValue}
                        day={cellTypeAttributes.day}
                        era={cellTypeAttributes.era}
                        hour={cellTypeAttributes.hour}
                        hour12={cellTypeAttributes.hour12}
                        minute={cellTypeAttributes.minute}
                        month={cellTypeAttributes.month}
                        second={cellTypeAttributes.second}
                        time-zone={cellTypeAttributes.timeZone}
                        time-zone-name={cellTypeAttributes.timeZoneName}
                        weekday={cellTypeAttributes.weekday}
                        year={cellTypeAttributes.year}
                    >
                    </lightning-formatted-date-time>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-formatted-date-time
                        value={dateValue}
                        day={typeAttribute0}
                        era={typeAttribute1}
                        hour={typeAttribute2}
                        hour12={typeAttribute3}
                        minute={typeAttribute4}
                        month={typeAttribute5}
                        second={typeAttribute6}
                        time-zone={typeAttribute7}
                        time-zone-name={typeAttribute8}
                        weekday={typeAttribute9}
                        year={typeAttribute10}
                    >
                    </lightning-formatted-date-time>
                </template>
            </template>

            <!-- datetime -->
            <template if:true={isDateLocal}>
                <lightning-formatted-date-time
                    value={value}
                    day={computedDateLocalDay}
                    month={computedDateLocalMonth}
                    year={computedDateLocalYear}
                    time-zone="UTC"
                >
                </lightning-formatted-date-time>
            </template>

            <!-- email -->
            <template if:true={isEmail}>
                <lightning-formatted-email
                    data-is-datatable
                    data-navigation="enable"
                    data-action-triggers="enter"
                    value={value}
                    tabindex={internalTabIndex}
                >
                </lightning-formatted-email>
            </template>

            <!-- location -->
            <template if:true={isLocation}>
                <lightning-formatted-location
                    latitude={value.latitude}
                    longitude={value.longitude}
                >
                </lightning-formatted-location>
            </template>

            <!-- number -->
            <template if:true={isNumber}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-formatted-number
                        value={value}
                        minimum-integer-digits={cellTypeAttributes.minimumIntegerDigits}
                        minimum-fraction-digits={cellTypeAttributes.minimumFractionDigits}
                        maximum-fraction-digits={cellTypeAttributes.maximumFractionDigits}
                        minimum-significant-digits={cellTypeAttributes.minimumSignificantDigits}
                        maximum-significant-digits={cellTypeAttributes.maximumSignificantDigits}
                    >
                    </lightning-formatted-number>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-formatted-number
                        value={value}
                        minimum-integer-digits={typeAttribute0}
                        minimum-fraction-digits={typeAttribute1}
                        maximum-fraction-digits={typeAttribute2}
                        minimum-significant-digits={typeAttribute3}
                        maximum-significant-digits={typeAttribute4}
                    >
                    </lightning-formatted-number>
                </template>
            </template>

            <!-- percent -->
            <template if:true={isPercent}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-formatted-number
                        value={value}
                        format-style="percent"
                        minimum-integer-digits={cellTypeAttributes.minimumIntegerDigits}
                        minimum-fraction-digits={cellTypeAttributes.minimumFractionDigits}
                        maximum-fraction-digits={cellTypeAttributes.maximumFractionDigits}
                        minimum-significant-digits={cellTypeAttributes.minimumSignificantDigits}
                        maximum-significant-digits={cellTypeAttributes.maximumSignificantDigits}
                    >
                    </lightning-formatted-number>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-formatted-number
                        value={value}
                        format-style="percent"
                        minimum-integer-digits={typeAttribute0}
                        minimum-fraction-digits={typeAttribute1}
                        maximum-fraction-digits={typeAttribute2}
                        minimum-significant-digits={typeAttribute3}
                        maximum-significant-digits={typeAttribute4}
                    >
                    </lightning-formatted-number>
                </template>
            </template>

            <!-- phone -->
            <template if:true={isPhone}>
                <lightning-formatted-phone
                    data-navigation="enable"
                    data-action-triggers="enter"
                    value={value}
                    tabindex={internalTabIndex}
                >
                </lightning-formatted-phone>
            </template>

            <!-- Reference (Lookup) -->
            <template if:true={isReference}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-formatted-lookup
                        data-navigation="enable"
                        data-action-triggers="enter"
                        record-id={value}
                        tabindex={internalTabIndex}
                        display-value={cellTypeAttributes.displayValue}
                    >
                    </lightning-formatted-lookup>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-formatted-lookup
                        data-navigation="enable"
                        data-action-triggers="enter"
                        record-id={value}
                        tabindex={internalTabIndex}
                        display-value={typeAttribute0}
                    >
                    </lightning-formatted-lookup>
                </template>
            </template>

            <!-- row number -->
            <template if:true={isRowNumber}>
                <template if:true={_rowHasError}>
                    <template if:true={consolidateTypeAttributes}>
                        <lightning-primitive-datatable-tooltip
                            data-navigation="enable"
                            data-action-triggers="enter,space"
                            class="slds-m-horizontal_xxx-small"
                            size="xx-small"
                            header={cellTypeAttributes.error.title}
                            content={cellTypeAttributes.error.messages}
                            variant="error"
                            internal-tab-index={internalTabIndex}
                            alternative-text={cellTypeAttributes.error.alternativeText}
                        >
                        </lightning-primitive-datatable-tooltip>
                    </template>
                    <template if:false={consolidateTypeAttributes}>
                        <lightning-primitive-datatable-tooltip
                            data-navigation="enable"
                            data-action-triggers="enter,space"
                            class="slds-m-horizontal_xxx-small"
                            size="xx-small"
                            header={typeAttribute0.title}
                            content={typeAttribute0.messages}
                            variant="error"
                            internal-tab-index={internalTabIndex}
                            alternative-text={typeAttribute0.alternativeText}
                        >
                        </lightning-primitive-datatable-tooltip>
                    </template>
                </template>
                <span
                    class="slds-row-number slds-text-body_small slds-text-color_weak"
                    style={computedRowNumberStyle}
                ></span>
            </template>

            <!-- text -->
            <template if:true={isText}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-base-formatted-text
                        value={value}
                        linkify={cellTypeAttributes.linkify}
                    >
                    </lightning-base-formatted-text>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-base-formatted-text
                        value={value}
                        linkify={typeAttribute0}
                    >
                    </lightning-base-formatted-text>
                </template>
            </template>

            <!-- url -->
            <template if:true={isUrl}>
                <template if:true={consolidateTypeAttributes}>
                    <lightning-formatted-url
                        data-navigation="enable"
                        data-action-triggers="enter"
                        value={value}
                        tooltip={urlTooltip}
                        tabindex={internalTabIndex}
                        label={cellTypeAttributes.label}
                        target={urlTarget}
                    >
                    </lightning-formatted-url>
                </template>
                <template if:false={consolidateTypeAttributes}>
                    <lightning-formatted-url
                        data-navigation="enable"
                        data-action-triggers="enter"
                        value={value}
                        tooltip={urlTooltip}
                        tabindex={internalTabIndex}
                        label={typeAttribute0}
                        target={urlTarget}
                    >
                    </lightning-formatted-url>
                </template>
            </template>

            <!-- *************** SUFFIX ICONS ADD ALL TYPES BEFORE THIS *************** -->
            <template if:true={hasRightIcon}>
                <lightning-icon
                    icon-name={iconName}
                    class="slds-m-left_x-small slds-m-right_x-small"
                    size="x-small"
                    alternative-text={iconAlternativeText}
                ></lightning-icon>
                {iconLabel}
            </template>
            <!-- *************** SUFFIX ICONS END *************** -->
        </div>
        <template if:true={isEditable}>
            <button
                tabindex={internalTabIndex}
                class="slds-button slds-button_icon slds-button_icon-small slds-cell-edit__button slds-m-left_x-small"
                data-navigation="enable"
                data-action-triggers="enter,space"
                data-action-edit="true"
                style={computedEditButtonStyle}
                onclick={handleEditButtonClick}
                part="button button-icon"
            >
                <lightning-primitive-icon
                    icon-name="utility:edit"
                    size="xx-small"
                    svg-class="slds-button__icon slds-button__icon_hint slds-button__icon_lock slds-button__icon_edit"
                    exportparts="icon"
                >
                </lightning-primitive-icon>
                <span class="slds-assistive-text">
                    {editIconAssistiveText}
                </span>
            </button>
        </template>
        <!-- TODO: displayReadOnlyIcon is true only when the cell's "editable" property is false and its "displayReadOnlyIcon"
        property is true. The markup in this template therefore cannot be rendered concurrently with the template above that checks
        the editable property. -->
        <template if:true={shouldDisplayReadOnlyIcon}>
            <!-- TODO: Update the svg-classes once the SLDS team updates their read only icon design to not use classes that have the word 'button'
            in them in cases when the cell is read only and hence no button is actually rendered -->
            <span aria-label={readOnlyIconAlternativeText} role="img">
                <lightning-primitive-icon
                    icon-name="utility:lock"
                    size="xx-small"
                    svg-class="slds-button__icon slds-button__icon_hint slds-button__icon_lock slds-button__icon_small"
                >
                </lightning-primitive-icon>
            </span>
        </template>
    </span>
</template>
