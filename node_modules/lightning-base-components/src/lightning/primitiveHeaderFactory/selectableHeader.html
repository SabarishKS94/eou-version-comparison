<template>
    <span lwc:ref="columnHeader" class="slds-assistive-text" data-column-header>
        {computedColumnHeaderLabel}
    </span>
    <!-- Header Content -->
    <template lwc:if={showCheckbox}>
        <div lwc:ref="child" class={computedActionClass} style={columnStyles}>
            <span part="input-checkbox" class="slds-checkbox">
                <!-- Selectable Checkbox -->
                <input
                    lwc:ref="selectAll"
                    type="checkbox"
                    part="checkbox"
                    class="datatable-select-all"
                    name={computedOptionName}
                    id="lgt-dt-header-factory-id"
                    onclick={handleSelectAllRows}
                    tabindex={internalTabIndex}
                    data-action-triggers="space"
                    data-navigation="enable"
                    disabled={def.isBulkSelectionDisabled}>

                <label part="label-container" class="slds-checkbox__label" for="lgt-dt-header-factory-id">
                    <span part="indicator" class="slds-checkbox_faux"></span>
                    <span part="label" class="slds-form-element__label slds-assistive-text">
                        {computedSelectAllLabel}
                    </span>
                </label>
            </span>
        </div>
    </template>
    <template lwc:else>
        <!-- slds-th__action_form breaks styles when container is empty -->
        <div lwc:ref="child" class={computedActionClass} style={columnStyles}></div>
    </template>
</template>
