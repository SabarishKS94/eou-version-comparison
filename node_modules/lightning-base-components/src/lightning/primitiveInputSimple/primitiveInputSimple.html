<template>
    <div lwc:ref="container" part="input-text">
        <template if:false={hasExternalLabel}>
            <label class={computedLabelClass} for="input" part="label">
                <template if:true={required}>
                    <abbr class="slds-required" title={i18n.required} part="required" aria-hidden="true">*</abbr>
                </template>
                {label}
                <slot name="label-end"></slot>
            </label>
            <lightning-helptext
                if:true={fieldLevelHelp}
                content={fieldLevelHelp}
                alternative-text={helptextAlternativeText}
            ></lightning-helptext>
        </template>
        <div
            class={computedFormElementClass}
            part="input-container"
            type={internalType}
        >
            <template if:true={showErrorIcon}>
                <lightning-primitive-icon
                    icon-name="utility:error"
                    svg-class="slds-input__icon"
                    variant="bare"
                >
                </lightning-primitive-icon>
            </template>
            <input
                accesskey={accessKey}
                aria-haspopup={ariaHasPopup}
                aria-invalid={ariaInvalid}
                aria-label={ariaLabel}
                aria-keyshortcuts={ariaKeyShortcuts}
                aria-disabled={ariaDisabled}
                aria-roledescription={ariaRoleDescription}
                aria-autocomplete={ariaAutoComplete}
                aria-expanded={ariaExpanded}
                autocomplete={autocomplete}
                class="slds-input"
                disabled={disabled}
                id="input"
                inputmode={inputmode}
                max={max}
                maxlength={maxLength}
                min={min}
                minlength={minLength}
                name={name}
                onblur={handleBlur}
                onchange={handleChange}
                onfocus={handleFocus}
                oninput={handleInput}
                onkeydown={handleKeyDown}
                role={role}
                part="input"
                pattern={pattern}
                placeholder={placeholder}
                required={required}
                readonly={readOnly}
                step={step}
                type={internalType}
            />

            <template if:true={isTypeSearch}>
                <lightning-primitive-icon
                    icon-name="utility:search"
                    variant="bare"
                    svg-class="slds-input__icon slds-input__icon_left slds-icon-text-default"
                ></lightning-primitive-icon>
                <div
                    class="slds-input__icon-group slds-input__icon-group_right"
                >
                    <template if:true={isLoading}>
                        <div
                            role="status"
                            class="slds-spinner slds-spinner_brand slds-spinner_x-small slds-input__spinner"
                        >
                            <span class="slds-assistive-text"
                                >{i18n.loading}</span
                            >
                            <div class="slds-spinner__dot-a"></div>
                            <div class="slds-spinner__dot-b"></div>
                        </div>
                    </template>
                    <template if:true={showClearButton}>
                        <button
                            data-element-id="searchClear"
                            class="slds-input__icon slds-input__icon_right slds-button slds-button_icon"
                            onclick={clearAndSetFocusOnInput}
                            type="button"
                        >
                            <lightning-primitive-icon
                                icon-name="utility:clear"
                                variant="bare"
                                svg-class="slds-button__icon"
                            ></lightning-primitive-icon>
                            <span class="slds-assistive-text"
                                >{i18n.clear}</span
                            >
                        </button>
                    </template>
                </div>
            </template>
        </div>
    </div>
    <div id="help-message" data-name={name} class={computedHelpMessageClass} data-help-message part="help-text" aria-live="polite">
        <template if:true={_helpMessage}>
            <span class="slds-assistive-text">{label}</span>
            {_helpMessage}
        </template>
    </div>
</template>
