<template>
    <div class="slds-popover slds-popover_small" role="dialog" aria-modal="true" aria-label="Edit Field">
        <div class="slds-popover__body">
            <input
                type="text"
                class="slds-input"
                value={editedValue}
                oninput={handleInputChange}
                aria-label="Field Text"
            />
        </div>
        <footer class="slds-popover__footer">
            <lightning-button
                label="Save"
                variant="brand"
                onclick={handleSave}
            ></lightning-button>
            <lightning-button
                label="Cancel"
                variant="neutral"
                onclick={handleCancel}
            ></lightning-button>
        </footer>
    </div>
</template>
