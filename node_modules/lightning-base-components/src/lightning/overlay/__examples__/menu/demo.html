<template>
    <div class="slds-popover slds-popover_small" role="menu" aria-label="Menu">
        <div class="slds-popover__body menu-body">
            <ul class="menu-list">
                <template iterator:item={items}>
                    <li
                        key={item.value.value}
                        class="menu-item"
                        role="none"
                    >
                    <div
                            lwc:if={item.first}
                            class="menu-option"
                            role="menuitem"
                            tabindex="-1"
                            data-value={item.value.value}
                            onclick={handleItemClick}
                            onkeydown={handleItemKeyDown}
                            autofocus
                        >
                            <span class="menu-option-text">
                                {item.value.label}
                            </span>
                        </div>
                        <div
                            lwc:else
                            class="menu-option"
                            role="menuitem"
                            tabindex="-1"
                            data-value={item.value.value}
                            onclick={handleItemClick}
                            onkeydown={handleItemKeyDown}
                        >
                            <span class="menu-option-text">
                                {item.value.label}
                            </span>
                        </div>
                    </li>
                </template>
            </ul>
        </div>
    </div>
</template>
