<template>
    <div part="combobox">
        <!-- Span wrapper prevents VoiceOver from announcing label as clickable while maintaining cross-shadow DOM click functionality -->
        <span onclick={handleLabelClicked}>
            <label class={computedLabelClass} part="label">
                <template if:true={required}>
                    <abbr
                        class="slds-required"
                        title={i18n.required}
                        part="required"
                        >*</abbr
                    >
                </template>
                {label}
            </label>
        </span>

        <lightning-helptext
            if:true={_fieldLevelHelp}
            content={_fieldLevelHelp}
            alternative-text={helptextAlternativeText}
        ></lightning-helptext>

        <div class="slds-form-element__control">
            <lightning-base-combobox
                name={name}
                autocomplete={autocomplete}
                aria-invalid={computedAriaInvalid}
                root-aria-node={templateRootNode}
                required={required}
                disabled={disabled}
                exportparts="dropdown, option, input, input-button, input-button-value"
                placeholder={placeholder}
                items={_items}
                input-text={_selectedLabel}
                input-label={label}
                input-icon-size="xx-small"
                input-icon-name="utility:down"
                show-dropdown-activity-indicator={spinnerActive}
                dropdown-alignment={dropdownAlignment}
                ondropdownopen={handleDropdownOpen}
                readonly={readOnly}
                onfocus={handleFocus}
                help-text-element={helpTextElement}
                onblur={handleBlur}
                onready={handleComboboxReady}
                onselect={handleSelect}
                variant={variant}
            ></lightning-base-combobox>
        </div>
        <div role="status">
            <div id="help-text" data-help-text class="slds-form-element__help">
                <template if:true={_helpMessage}>
                    <span class="slds-assistive-text">{label}</span>
                    {_helpMessage}
                </template>
            </div>
        </div>
    </div>
</template>
